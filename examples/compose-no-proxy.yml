services:
  freescout-app:
    image: docker.io/nfrastack/freescout:latest
    container_name: freescout-app
    ports:
      - 80:80
    volumes:
      ### If you want to perform customizations to the source and have access to it, then uncomment this line - This includes modules
      #- ./data:/www/html
      ### Or, if you just want to use Stock Freescout and hold onto persistent files like cache and session use this, one or the other.
      - ./data:/data
      ### If you want to just keep the original source and add additional modules uncomment this line
      #- ./modules:/www/html/Modules
      - ./logs:/logs
    environment:
      - CONTAINER_NAME=freescout-app
      - TIMEZONE=America/Vancouver
      - DEBUG_MODE=FALSE

      - DB_TYPE=mariadb
      - DB_HOST=freescout-db
      - DB_PORT=3306
      - DB_NAME=freescout
      - DB_USER=freescout
      - DB_PASS=freescoutpass
      # - DB_SSL=TRUE
      # - FREESCOUT_DB_PGSQL_SSL_MODE=require    # only when DB_TYPE=pgsql

      - ADMIN_EMAIL=admin@example.com   # Only required for fresh DB
      - ADMIN_FIRST_NAME=FreeScout      #
      - ADMIN_LAST_NAME=Admin           #
      - ADMIN_PASS=freescout            #

      - APP_URL=https://freescout.example.com # Required!

      # All other FreeScout `.env` config goes through FREESCOUT_ prefix
      #
      # Use these values to remove an in place config value
      #   FREESCOUT_FOO=unset    FREESCOUT_FOO=null    FREESCOUT_FOO=
      #
      # Docker secrets: any FREESCOUT_<KEY>_FILE=/run/secrets/x is resolved into FREESCOUT_<KEY>=<contents> before passthrough.

      # - FREESCOUT_APP_SINCE_WITHOUT_QUOTES_ON_FETCHING=false
      # - FREESCOUT_APP_DEBUG=false
      - FREESCOUT_APP_LOCALE=en
      - FREESCOUT_APP_TIMEZONE=America/Vancouver

      - FREESCOUT_MAIL_DRIVER=smtp
      - FREESCOUT_MAIL_HOST=postfix-relay
      - FREESCOUT_MAIL_PORT=25
      - FREESCOUT_MAIL_FROM_ADDRESS=freescout@example.com
      - FREESCOUT_MAIL_FROM_NAME=FreeScout
      # - FREESCOUT_MAIL_USERNAME=...
      # - FREESCOUT_MAIL_PASSWORD_FILE=/run/secrets/smtp_password
      # - FREESCOUT_MAIL_ENCRYPTION=tls
    restart: always

  freescout-db:
    image: docker.io/nfrastack/mariadb:11.8
    container_name: freescout-db
    volumes:
      - ./db:/data
    environment:
      - TIMEZONE=America/Vancouver
      - CONTAINER_NAME=freescout-db

      - ROOT_PASS=rootpassword
      - DB_NAME=freescout
      - DB_USER=freescout
      - DB_PASS=freescoutpass
    restart: always

  freescout-db-backup:
    image: docker.io/tiredofit/db-backup
    container_name: freescout-db-backup
    volumes:
      - ./dbbackup:/backup
    environment:
      - CONTAINER_NAME=freescout-db-backup
      - DB01_HOST=freescout-db
      - DB01_TYPE=mariadb
      - DB01_NAME=freescout
      - DB01_USER=freescout
      - DB01_PASS=freescoutpass
      - DB01_BACKUP_INTERVAL=1440
      - DB01_BACKUP_BEGIN=0000
      - DB01_CLEANUP_TIME=8640
    restart: always
